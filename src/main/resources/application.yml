server:
  port: 8080

spring:
  application:
    name: maodouhub

  # 开发环境用 H2 内存数据库，生产环境切 MySQL
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:maodouhub;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# Hub 自定义配置
hub:
  jwt:
    secret: "dev-secret-key-change-in-production-must-be-at-least-256-bits-long!!"
    expiration-hours: 24
  file:
    storage-dir: /tmp/maodouhub-files
    max-size-mb: 50
    retention-days: 90
  device:
    heartbeat-timeout-seconds: 90
    signature-time-window-seconds: 300
  rate-limit:
    message-per-minute: 10
    file-per-hour: 20
    poll-interval-seconds: 3

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://localhost:3306/maodouhub?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:maodouhub}
    password: ${DB_PASSWORD}

  h2:
    console:
      enabled: false

hub:
  jwt:
    secret: ${JWT_SECRET}
  file:
    storage-dir: ${FILE_STORAGE_DIR:/data/maodouhub/files}
